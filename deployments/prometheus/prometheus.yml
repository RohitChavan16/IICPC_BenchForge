global:
  scrape_interval: 5s

scrape_configs:

  - job_name: "mock-exchange"

    static_configs:
      - targets:
          - "mock-exchange:9000"

  - job_name: "cadvisor"

    static_configs:
      - targets:
          - "cadvisor:8080"


  - job_name: "redis-exporter"

    static_configs:
      - targets:
          - "redis-exporter:9121"


  - job_name: "postgres-exporter"

    static_configs:
      - targets:
          - "postgres-exporter:9187"